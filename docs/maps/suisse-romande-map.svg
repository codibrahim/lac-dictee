<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#0f172a" rx="16"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="white" font-size="22" font-weight="800">🇫🇷 LacDictée — Primary Market</text>
  <text x="400" y="66" text-anchor="middle" fill="#64748b" font-size="13">Suisse Romande · French-speaking Switzerland</text>

  <!-- Switzerland simplified outline (grey) -->
  <g transform="translate(90, 80) scale(2.6)">

    <!-- CH outline approximation -->
    <path d="
      M 60,20 L 85,15 L 110,18 L 135,10 L 160,18 L 175,30 L 185,22 L 200,28
      L 205,45 L 195,55 L 200,70 L 190,85 L 175,90 L 165,105 L 145,110
      L 130,105 L 115,112 L 100,108 L 85,115 L 70,108 L 55,112
      L 40,100 L 28,88 L 20,75 L 25,60 L 15,48 L 22,35 L 40,28 L 60,20 Z
    " fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

    <!-- Suisse Romande region (highlighted in indigo) -->
    <!-- Valais (VS) — southern strip -->
    <path d="
      M 28,88 L 40,100 L 55,112 L 70,108 L 85,115 L 100,108
      L 115,112 L 110,100 L 100,90 L 88,80 L 75,78 L 60,82
      L 45,78 L 35,82 L 28,88 Z
    " fill="#6366f1" fill-opacity="0.55" stroke="#818cf8" stroke-width="1.2"/>

    <!-- Vaud + Genève + Fribourg + Neuchâtel + Jura (NW block) -->
    <path d="
      M 20,75 L 25,60 L 15,48 L 22,35 L 40,28 L 60,20 L 85,15
      L 100,18 L 105,30 L 110,45 L 108,60 L 100,70 L 88,80
      L 75,78 L 60,82 L 45,78 L 35,82 L 28,88 L 20,75 Z
    " fill="#6366f1" fill-opacity="0.55" stroke="#818cf8" stroke-width="1.2"/>

    <!-- Canton labels -->
    <text x="55" y="55" fill="#c7d2fe" font-size="7.5" font-weight="700">Vaud</text>
    <text x="28" y="68" fill="#c7d2fe" font-size="6.5" font-weight="700">GE</text>
    <text x="72" y="42" fill="#c7d2fe" font-size="6.5" font-weight="700">Neuchâtel</text>
    <text x="42" y="38" fill="#c7d2fe" font-size="6.5" font-weight="700">Jura</text>
    <text x="92" y="58" fill="#c7d2fe" font-size="6.5" font-weight="700">Fribourg</text>
    <text x="62" y="98" fill="#c7d2fe" font-size="7.5" font-weight="700">Valais</text>

    <!-- German-speaking area labels -->
    <text x="140" y="55" fill="#475569" font-size="7" font-style="italic">German</text>
    <text x="138" y="65" fill="#475569" font-size="7" font-style="italic">speaking</text>
    <text x="145" y="90" fill="#475569" font-size="6.5" font-style="italic">Ticino</text>

  </g>

  <!-- Divider -->
  <line x1="40" y1="390" x2="760" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- Stats row -->
  <!-- Card 1 -->
  <rect x="50" y="408" width="200" height="80" rx="10" fill="#1e293b" stroke="#4338ca" stroke-width="1"/>
  <text x="150" y="440" text-anchor="middle" fill="#818cf8" font-size="24" font-weight="800">~18,600</text>
  <text x="150" y="460" text-anchor="middle" fill="#64748b" font-size="11">Teachers in Romandy</text>
  <text x="150" y="476" text-anchor="middle" fill="#4338ca" font-size="9.5">Source: Swiss FSO</text>

  <!-- Card 2 -->
  <rect x="300" y="408" width="200" height="80" rx="10" fill="#1e293b" stroke="#4338ca" stroke-width="1"/>
  <text x="400" y="440" text-anchor="middle" fill="#818cf8" font-size="24" font-weight="800">CHF 9/mo</text>
  <text x="400" y="460" text-anchor="middle" fill="#64748b" font-size="11">Teacher Pro Plan</text>
  <text x="400" y="476" text-anchor="middle" fill="#4338ca" font-size="9.5">~94% gross margin</text>

  <!-- Card 3 -->
  <rect x="550" y="408" width="200" height="80" rx="10" fill="#1e293b" stroke="#4338ca" stroke-width="1"/>
  <text x="650" y="440" text-anchor="middle" fill="#818cf8" font-size="24" font-weight="800">CHF 1,347</text>
  <text x="650" y="460" text-anchor="middle" fill="#64748b" font-size="11">MRR at 12 months</text>
  <text x="650" y="476" text-anchor="middle" fill="#4338ca" font-size="9.5">Conservative projection</text>

  <!-- Legend -->
  <rect x="580" y="100" width="14" height="14" rx="3" fill="#6366f1" fill-opacity="0.6" stroke="#818cf8" stroke-width="1"/>
  <text x="600" y="112" fill="#a5b4fc" font-size="12" font-weight="600">Suisse Romande</text>
  <rect x="580" y="122" width="14" height="14" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="134" fill="#475569" font-size="12">Rest of Switzerland</text>

</svg>
